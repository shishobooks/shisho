type_mappings:
  time.Time: "string /* RFC3339 */"
  # When a response struct embeds a model with `tstype:",extends"`, tygo emits
  # the package-qualified selector (e.g. `extends models.Genre`). Map it to the
  # bare interface name so the generated `extends` matches the `import { Genre }`
  # frontmatter. Add one entry per embedded model used in a response struct.
  models.Genre: "Genre"
  models.Tag: "Tag"
  models.Series: "Series"
  models.Person: "Person"
  # A model returned by name (not embedded, not field-level `tstype`-overridden)
  # also needs a mapping so tygo emits the bare interface name instead of `any`.
  # books.ts's MoveFilesResponse / MergeBooksResponse return a *models.Book.
  models.Book: "Book"
  models.Publisher: "Publisher"

packages:
  - path: "github.com/shishobooks/shisho/pkg/models"
    output_path: "app/types/generated/models.ts"
  - path: "github.com/shishobooks/shisho/pkg/books"
    output_path: "app/types/generated/books.ts"
    frontmatter: |
      import { AuthorRole, Book, FileRole, ReviewedFilter, SeriesNumberUnit } from "@/types";
    include_files:
      - types.go
  - path: "github.com/shishobooks/shisho/pkg/config"
    output_path: "app/types/generated/config.ts"
    include_files:
      - config.go
