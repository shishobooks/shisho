# Shisho Configuration File
#
# Copy this file to /config/shisho.yaml (or set CONFIG_FILE env var to point elsewhere)
#
# All settings can also be configured via environment variables.
# Environment variables use uppercase with underscores (e.g., DATABASE_FILE_PATH).
# Environment variables take precedence over config file values.

# =============================================================================
# DATABASE SETTINGS
# =============================================================================

# REQUIRED: Path to the SQLite database file
# Env: DATABASE_FILE_PATH
database_file_path: /data/shisho.db

# Enable SQL query logging (useful for debugging)
# Env: DATABASE_DEBUG
# Default: false
database_debug: false

# Number of connection retry attempts on startup
# Env: DATABASE_CONNECT_RETRY_COUNT
# Default: 5
database_connect_retry_count: 5

# Delay between connection retry attempts
# Env: DATABASE_CONNECT_RETRY_DELAY
# Default: 2s
database_connect_retry_delay: 2s

# SQLite busy timeout - how long to wait when the database is locked
# Env: DATABASE_BUSY_TIMEOUT
# Default: 5s
database_busy_timeout: 5s

# Maximum number of retries for database operations on busy/locked errors
# Env: DATABASE_MAX_RETRIES
# Default: 5
database_max_retries: 5

# =============================================================================
# SERVER SETTINGS
# =============================================================================

# Host address to bind the server to
# Env: SERVER_HOST
# Default: 0.0.0.0
server_host: 0.0.0.0

# Port to listen on
# Env: SERVER_PORT
# Default: 3689
server_port: 3689

# =============================================================================
# APPLICATION SETTINGS
# =============================================================================

# How often to scan libraries for new content (in minutes)
# Env: SYNC_INTERVAL_MINUTES
# Default: 60
sync_interval_minutes: 60

# Number of background worker processes
# Env: WORKER_PROCESSES
# Default: 2
worker_processes: 2

# How many days to retain completed/failed jobs (older jobs are deleted)
# Set to 0 to disable retention cleanup
# Env: JOB_RETENTION_DAYS
# Default: 30
job_retention_days: 30

# =============================================================================
# CACHE SETTINGS
# =============================================================================

# Directory for caching generated files
# This includes:
#   - {cache_dir}/downloads/  Generated download files with embedded metadata
#   - {cache_dir}/cbz/        Extracted CBZ page images for the comic viewer
#   - {cache_dir}/pdf/        Rendered PDF page images for the PDF viewer
# Env: CACHE_DIR
# Default: /config/cache
cache_dir: /config/cache

# Maximum size of the download cache in gigabytes
# When the cache exceeds this size, older files are automatically removed (LRU).
# Env: DOWNLOAD_CACHE_MAX_SIZE_GB
# Default: 5
download_cache_max_size_gb: 5

# DPI for rendering PDF pages in the viewer (higher = sharper but larger images)
# Range: 72-600. At 200 DPI, a typical letter-size page renders to ~1700x2200 pixels.
# Env: PDF_RENDER_DPI
# Default: 200
pdf_render_dpi: 200

# JPEG quality for rendered PDF pages (higher = better quality but larger files)
# Range: 1-100
# Env: PDF_RENDER_QUALITY
# Default: 85
pdf_render_quality: 85

# =============================================================================
# PLUGIN SETTINGS
# =============================================================================

# Directory where installed plugins are stored
# Env: PLUGIN_DIR
# Default: /config/plugins/installed
plugin_dir: /config/plugins/installed

# Directory where plugin persistent data is stored (caches, tokens, DB files)
# Data survives plugin updates; optionally deleted on uninstall with delete_data=true
# Env: PLUGIN_DATA_DIR
# Default: /config/plugins/data
plugin_data_dir: /config/plugins/data

# =============================================================================
# ENRICHMENT SETTINGS
# =============================================================================

# Confidence threshold for automatic metadata enrichment during scans.
# When a plugin returns a confidence score with search results, results
# below this threshold are skipped. Range: 0.0 - 1.0 (0.85 = 85%).
# Per-plugin thresholds can override this in plugin settings.
# Env: ENRICHMENT_CONFIDENCE_THRESHOLD
enrichment_confidence_threshold: 0.85

# =============================================================================
# LIBRARY MONITOR SETTINGS
# =============================================================================

# Enable real-time filesystem monitoring of library paths
# When enabled, file changes (create, modify, delete) are detected automatically
# and trigger targeted rescans without requiring a full library scan.
# Disable if your library is on a network drive that doesn't support inotify/FSEvents.
# On Linux, large libraries may require increasing the inotify watch limit:
#   sysctl -w fs.inotify.max_user_watches=524288
# Or persist via /etc/sysctl.d/99-inotify.conf
# Env: LIBRARY_MONITOR_ENABLED
# Default: true
library_monitor_enabled: true

# Delay in seconds before processing detected filesystem changes
# When a change is detected, the monitor waits this long before acting.
# If more changes occur during the wait, the timer resets — this batches
# rapid changes (e.g., copying multiple files) into a single rescan.
# Env: LIBRARY_MONITOR_DELAY_SECONDS
# Default: 60
library_monitor_delay_seconds: 60

# =============================================================================
# SUPPLEMENT DISCOVERY SETTINGS
# =============================================================================

# Patterns to exclude from supplement discovery (glob patterns)
# These files will not be picked up as supplements even if they're in book directories
# Env: SUPPLEMENT_EXCLUDE_PATTERNS (comma-separated)
# Default: [".*", ".DS_Store", "Thumbs.db", "desktop.ini"]
supplement_exclude_patterns:
  - ".*" # hidden files (dotfiles)
  - ".DS_Store"
  - "Thumbs.db"
  - "desktop.ini"

# =============================================================================
# AUTHENTICATION SETTINGS
# =============================================================================

# REQUIRED: Secret key for signing JWT tokens
# Use a long, random string (at least 32 characters recommended)
# Generate one with: openssl rand -base64 32
# Env: JWT_SECRET
jwt_secret: your-secret-key-here-change-me

# How many days a login session remains valid before requiring re-authentication
# Env: SESSION_DURATION_DAYS
# Default: 30
session_duration_days: 30
