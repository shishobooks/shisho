name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise lint

  test:
    name: Go Test (${{ matrix.shard }}/5)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2, 3, 4, 5]
    env:
      TZ: America/Chicago
      CI: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Install gotesplit
        run: curl -sfL https://raw.githubusercontent.com/Songmu/gotesplit/main/install.sh | sh -s -- -b /usr/local/bin v0.4.0
      - name: Run tests
        env:
          SHARD: ${{ matrix.shard }}
        run: gotesplit -total=5 -index=$((SHARD - 1)) ./pkg/... -- -race

  lint-js:
    name: JS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - run: mise tygo
      - run: mise lint:js

  # Runs on every PR with no path filter. The Docusaurus build can break
  # from dependency bumps that only touch the root pnpm-lock.yaml (e.g. a
  # dependabot bump of @docusaurus/* that misses a new required peer), so
  # filtering on website/** would reintroduce the gap this job exists to
  # close. Do not add a paths-ignore here.
  docs-build:
    name: Docs Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - run: pnpm -C website build

  test-js:
    name: JS Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $NF}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox

      - run: go mod download
      - run: mise tygo
      - run: pnpm test:unit
      - run: mise build
      - run: pnpm e2e:chromium
      - run: pnpm e2e:firefox
