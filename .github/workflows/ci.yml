name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_call:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  lint:
    name: Go Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: mise lint

  test:
    name: Go Test (${{ matrix.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: worker
            packages: ./pkg/worker/...
          - name: plugins
            packages: ./pkg/plugins/...
          - name: books
            packages: ./pkg/books/...
          - name: rest-1
            shard: 1
            shards: 2
          - name: rest-2
            shard: 2
            shards: 2
    env:
      TZ: America/Chicago
      CI: "true"
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - name: Run tests
        env:
          PACKAGES: ${{ matrix.packages }}
          SHARD: ${{ matrix.shard }}
          SHARDS: ${{ matrix.shards }}
        run: |
          if [ -n "$PACKAGES" ]; then
            packages="$PACKAGES"
          else
            packages=$(go list ./pkg/... \
              | grep -vE '/pkg/(worker|plugins|books)$' \
              | awk -v shard="$SHARD" -v shards="$SHARDS" 'NR % shards == shard % shards')
          fi
          if [ -z "$packages" ]; then
            echo "No packages selected — skipping"
            exit 0
          fi
          echo "Running $(echo "$packages" | wc -w) packages:"
          echo "$packages"
          go test -race $packages

  lint-js:
    name: JS Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile
      - run: mise tygo
      - run: mise lint:js

  test-js:
    name: JS Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: jdx/mise-action@v4
      - run: pnpm install --frozen-lockfile

      - name: Get Playwright version
        id: playwright-version
        run: echo "version=$(npx playwright --version | awk '{print $NF}')" >> $GITHUB_OUTPUT

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}

      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium firefox

      - name: Install Playwright system dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium firefox

      - run: go mod download
      - run: mise tygo
      - run: pnpm test:unit
      - run: mise build
      - run: pnpm e2e:chromium
      - run: pnpm e2e:firefox
